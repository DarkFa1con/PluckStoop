<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PluckStoop</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #00ffb3;
      --bg: #080c10;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      -webkit-app-region: drag;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
    }

    /* Animated grid background */
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,179,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,179,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridFade 1.5s ease forwards;
      opacity: 0;
    }
    @keyframes gridFade { to { opacity: 1; } }

    /* Radial glow center */
    .glow {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(0,255,179,0.07) 0%, transparent 70%);
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* Scan line */
    .scanline {
      position: fixed; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,255,179,0.6), transparent);
      animation: scan 2s ease-in-out forwards;
      top: -10px;
    }
    @keyframes scan { 0% { top: -10px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 110%; opacity: 0; } }

    /* Main container */
    .container {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 10;
    }

    /* Icon */
    .icon-wrap {
      width: 110px; height: 110px;
      position: relative;
      margin-bottom: 28px;
      animation: iconIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
    }
    @keyframes iconIn {
      from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .icon-wrap img {
      width: 100%; height: 100%;
      border-radius: 24px;
      box-shadow: 0 0 0 1px rgba(0,255,179,0.15), 0 0 40px rgba(0,255,179,0.15), 0 20px 40px rgba(0,0,0,0.6);
    }

    /* Rotating ring */
    .icon-ring {
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 1.5px dashed rgba(0,255,179,0.25);
      animation: ringRotate 8s linear infinite;
    }
    @keyframes ringRotate { to { transform: rotate(360deg); } }

    .icon-ring::before {
      content: '';
      position: absolute; top: -3px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* App name */
    .app-name {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
      animation: textIn 0.5s ease 0.6s both;
    }
    @keyframes textIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .app-name span { color: var(--accent); }

    .app-tagline {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(0,255,179,0.5);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 8px;
      animation: textIn 0.5s ease 0.75s both;
    }

    /* Version badge */
    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,255,179,0.07);
      border: 1px solid rgba(0,255,179,0.15);
      border-radius: 20px;
      padding: 4px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      color: rgba(0,255,179,0.6);
      margin-top: 16px;
      animation: textIn 0.5s ease 0.9s both;
    }
    .version-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

    /* Progress bar */
    .progress-wrap {
      width: 200px;
      margin-top: 44px;
      animation: textIn 0.5s ease 1s both;
    }
    .progress-track {
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      box-shadow: 0 0 8px var(--accent);
      animation: progressRun 2s cubic-bezier(0.4,0,0.2,1) 1s forwards;
    }
    @keyframes progressRun { 0% { width: 0%; } 60% { width: 80%; } 85% { width: 92%; } 100% { width: 100%; } }

    .progress-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9.5px;
      color: rgba(0,255,179,0.35);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.1em;
      animation: loadingText 2s step-end 1s forwards;
    }
    @keyframes loadingText {
      0%   { content: 'INITIALIZING…'; }
    }

    /* Author credit */
    .author-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(0,255,179,0.06);
      animation: fadeUp 0.5s ease 1.1s both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .author-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
    }
    .author-name strong { color: rgba(0,255,179,0.5); font-weight: 600; }

    .built-with {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.1);
      letter-spacing: 0.06em;
    }

    /* Corner decorations */
    .corner { position: fixed; width: 20px; height: 20px; }
    .corner.tl { top: 12px; left: 12px; border-top: 1.5px solid rgba(0,255,179,0.2); border-left: 1.5px solid rgba(0,255,179,0.2); border-radius: 2px 0 0 0; }
    .corner.tr { top: 12px; right: 12px; border-top: 1.5px solid rgba(0,255,179,0.2); border-right: 1.5px solid rgba(0,255,179,0.2); border-radius: 0 2px 0 0; }
    .corner.bl { bottom: 46px; left: 12px; border-bottom: 1.5px solid rgba(0,255,179,0.2); border-left: 1.5px solid rgba(0,255,179,0.2); border-radius: 0 0 0 2px; }
    .corner.br { bottom: 46px; right: 12px; border-bottom: 1.5px solid rgba(0,255,179,0.2); border-right: 1.5px solid rgba(0,255,179,0.2); border-radius: 0 0 2px 0; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="scanline"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <div class="icon-wrap">
      <img src="icon.png" alt="PluckStoop"/>
      <div class="icon-ring"></div>
    </div>

    <div class="app-name">Pluck<span>Stoop</span></div>
    <div class="app-tagline">Metadata Scrubber</div>

    <div class="version-badge">
      <div class="version-dot"></div>
      Version 2.0.0
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div class="progress-label">INITIALIZING…</div>
    </div>
  </div>

  <div class="author-strip">
    <div class="author-name">by <strong>Muhammad Hassnain</strong></div>
    <div class="built-with">BUILT WITH ELECTRON · NODE.JS</div>
  </div>
</body>
</html>
